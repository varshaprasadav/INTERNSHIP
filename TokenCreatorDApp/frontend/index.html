<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Token Creator DApp</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-4xl mx-auto py-10 px-4">

<div class="bg-white rounded-xl shadow-lg p-8">

<h1 class="text-4xl font-bold text-center text-blue-600 mb-6">
Token Creator DApp
</h1>


<!-- CONNECT WALLET -->

<div class="text-center mb-8">

<button
onclick="connectWallet()"
class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">

Connect Wallet

</button>

<button
onclick="refreshDApp()"
class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg ml-3">

Refresh DApp

</button>

<p
id="walletAddress"
class="mt-3 text-gray-700 font-medium">
</p>

</div>
<p
id="status"
class="mt-2 text-green-600 font-medium">
</p>

<!-- TABS -->

<div class="flex justify-center gap-4 flex-wrap">

<button
onclick="showTab('erc20')"
class="bg-gray-200 hover:bg-gray-300 px-5 py-2 rounded-lg">

ERC20

</button>

<button
onclick="showTab('erc721')"
class="bg-gray-200 hover:bg-gray-300 px-5 py-2 rounded-lg">

ERC721

</button>

<button
onclick="showTab('erc1155')"
class="bg-gray-200 hover:bg-gray-300 px-5 py-2 rounded-lg">

ERC1155

</button>

</div>

<!-- ========================= -->
<!-- ERC20 SECTION -->
<!-- ========================= -->

<div id="erc20Section" class="mt-8">

<h2 class="text-2xl font-bold mb-4">
Create ERC20 Token
</h2>

<input
id="erc20Name"
placeholder="Token Name"
class="w-full border rounded-lg p-3 mb-3">

<input
id="erc20Symbol"
placeholder="Token Symbol"
class="w-full border rounded-lg p-3 mb-3">

<input
id="erc20Supply"
placeholder="Total Supply"
class="w-full border rounded-lg p-3 mb-4">

<button
onclick="createERC20()"
class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg">

Create ERC20

</button>

</div>

<!-- ========================= -->
<!-- ERC721 SECTION -->
<!-- ========================= -->

<div id="erc721Section" class="hidden mt-8">

<h2 class="text-3xl font-bold text-blue-600 mb-6">
Create ERC721 NFT
</h2>

<div class="grid md:grid-cols-2 gap-8">

<!-- LEFT SIDE -->

<div>

<input
id="erc721Name"
placeholder="Collection Name"
class="w-full border rounded-lg p-3 mb-4">

<input
id="erc721Symbol"
placeholder="Collection Symbol"
class="w-full border rounded-lg p-3 mb-4">

<input
type="file"
id="erc721Image"
accept="image/*"
onchange="preview721(event)"
class="w-full border rounded-lg p-3 mb-4">

<button
onclick="createERC721()"
class="bg-green-600 hover:bg-green-700 text-white w-full py-3 rounded-lg">

Create NFT

</button>

<button
onclick="loadGallery()"
class="bg-purple-600 hover:bg-purple-700 text-white w-full py-3 rounded-lg mt-3">

NFT Gallery

</button>
</div>
<!-- RIGHT SIDE -->

<div>

<div class="border rounded-xl p-4 bg-gray-50">

<h3 class="text-xl font-bold mb-3">

Image Preview

</h3>

<img

id="preview721"

src="https://placehold.co/350x300?text=NFT+Preview"

class="w-full h-72 object-cover rounded-lg border">

</div>

</div>

</div>

<!-- ========================= -->
<!-- NFT DETAILS -->
<!-- ========================= -->

<div

id="nftCard"

class="hidden mt-10 border rounded-xl p-6 bg-white shadow">

<h2 class="text-2xl font-bold text-green-600 mb-5">

NFT Created Successfully

</h2>

<div class="grid md:grid-cols-2 gap-8">

<div>

<img

id="mintedImage"

class="w-full rounded-lg border">

</div>

<div>

<p class="mb-2">

<b>Collection :</b>

<span id="collectionName"></span>

</p>

<p class="mb-2">

<b>Symbol :</b>

<span id="collectionSymbol"></span>

</p>

<p class="mb-2">

<b>Token ID :</b>

<span id="tokenId"></span>

</p>

<p class="mb-2">

<b>Owner :</b>

<span id="owner"></span>

</p>

<p class="mb-2 break-all">

<b>Contract :</b>

<span id="contractAddress"></span>

</p>



<div class="flex gap-3 mt-5">

<a

id="viewNFT"

target="_blank"

class="bg-blue-600 text-white px-5 py-2 rounded">

View NFT

</a>

<a

id="explorer"

target="_blank"

class="bg-green-600 text-white px-5 py-2 rounded">

Explorer

</a>

</div>

</div>

</div>

</div>
<!-- ========================= -->
<!-- NFT GALLERY -->
<!-- ========================= -->

<div
id="gallerySection"
class="hidden mt-10">

<h2 class="text-3xl font-bold text-blue-600 mb-5">

My NFT Gallery

</h2>

<div
id="gallery"
class="grid md:grid-cols-3 gap-6">

</div>

</div>



</div>



<!-- ========================= -->
<!-- ERC1155 SECTION -->
<!-- ========================= -->

<div id="erc1155Section" class="hidden mt-8">

    <h2 class="text-2xl font-bold mb-6">
        Create ERC1155 NFT
    </h2>

    <input
        id="erc1155To"
        placeholder="Recipient Address"
        class="w-full border rounded-lg p-3 mb-3">

    <input
        id="erc1155Id"
        placeholder="Token ID"
        class="w-full border rounded-lg p-3 mb-3">

    <input
        id="erc1155Amount"
        placeholder="Number of Copies"
        class="w-full border rounded-lg p-3 mb-3">

    <input
        type="file"
        id="erc1155Image"
        accept="image/*"
        onchange="preview1155(event)"
        class="w-full border rounded-lg p-3 mb-3">

    <img
        id="preview1155"
        class="hidden w-64 rounded-lg border mb-4">

    <!-- Mint Button -->

    <button
        onclick="createERC1155()"
        class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg">

        Mint ERC1155 NFT

    </button>

    <!-- Gallery Button -->

    <button
        onclick="toggle1155Gallery()"
        class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-lg ml-3">

        ERC1155 Gallery

    </button>

    <!-- Gallery -->

    <div
        id="gallery1155"
        class="hidden mt-8">

        <h3 class="text-2xl font-bold mb-4">
            ERC1155 Gallery
        </h3>

        <div
            id="gallery1155Grid"
            class="grid md:grid-cols-3 gap-6">

        </div>

    </div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
